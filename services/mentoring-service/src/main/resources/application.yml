spring:
  application:
    name: mentoring-service
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/mentoring_db}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  jackson:
    deserialization:
      fail-on-unknown-properties: false

# 멘토링 실시간 WebSocket(/mentoring/ws) 의 브라우저 Origin 허용 목록(쉼표 구분)
app:
  ws:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:8081}

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
