spring:
  application:
    name: identity-service
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/identity_db}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_REDIRECT_URI}
            scope: profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

jwt:
  secret:
    key: ${JWT_SECRET}

app:
  domain:
    server: ${APP_DOMAIN_SERVER:http://localhost}
    cookie: ${APP_DOMAIN_COOKIE:localhost}
  aes:
    # 기본값 없음(fail-fast): 미설정 시 기동 실패. 운영/배포 시 AES_SECRET_KEY(32자) 반드시 주입.
    key: ${AES_SECRET_KEY}
  token:
    access-max-age: 1800000  # 30분 (밀리초)
    refresh-max-age: 604800000  # 7일 (밀리초)
    # 쿠키 속성은 배포 환경마다 다르므로 env 로 외부화(기본값은 로컬 http://localhost 용).
    #  - 다른 서버(IP/도메인) 배포 시 APP_TOKEN_ACCESS_FORMAT/REFRESH_FORMAT 으로 Domain·Secure 를 맞춰 주입.
    #  - HTTPS 도메인 예: "ATOKEN=%s; HttpOnly; Secure; SameSite=Lax; Domain=example.com; Path=/; Max-Age=%d"
    #  - IP 접속 예(도메인 생략 = host-only): "ATOKEN=%s; HttpOnly; SameSite=Lax; Path=/; Max-Age=%d"
    access-format: "${APP_TOKEN_ACCESS_FORMAT:ATOKEN=%s; HttpOnly; SameSite=Lax; Domain=localhost; Path=/; Max-Age=%d}"
    refresh-format: "${APP_TOKEN_REFRESH_FORMAT:RTOKEN=%s; HttpOnly; SameSite=Lax; Domain=localhost; Path=/; Max-Age=%d}"

project:
  upload:
    path: ${UPLOAD_PATH:./uploads}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
