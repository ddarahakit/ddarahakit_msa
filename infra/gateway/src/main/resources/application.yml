spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false   # 명시 라우트(RoutesConfig)만 사용
      # 게이트웨이가 CORS 를 일원화. 다운스트림(identity 등)이 동일 헤더를 추가해도
      # 중복 ACAO 로 브라우저가 거부하지 않도록 응답 헤더를 dedupe.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

# 게이트웨이 CORS 토글(서비스 추출 후 활성). 0단계엔 모놀리스가 CORS 처리하므로 off.
gateway:
  cors:
    enabled: ${GATEWAY_CORS_ENABLED:false}

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    # 0단계엔 등록할 서비스가 없어도 무방. 서버 부재 시 경고만.
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret:
    key: ${JWT_SECRET}

app:
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost,http://localhost:81,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
