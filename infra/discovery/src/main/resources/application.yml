spring:
  application:
    name: discovery-server

server:
  port: 8761

# 레지스트리 서버 자신은 등록/조회하지 않는다.
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,info
