# ============================================================================
#  MSA 스택 (0단계: Strangler Fig — 게이트웨이 뒤에 모놀리스)
#    Client → gateway(8080) → monolith(내부 8080)
#    인프라(mariadb·kafka·eureka)는 1단계부터 추출될 서비스를 위해 미리 기동.
#
#  ※ 기존 운영 스택(docker-compose.yml)과 포트가 겹치지 않게 mariadb 는 3307 로 노출.
#     이 스택은 MSA 개발용으로 별도 실행한다.
#  실행:  docker compose -f docker-compose.msa.yml up -d --build
# ============================================================================
name: ddarahakit-msa

services:
  # ---------- 인프라 ----------
  mariadb:
    image: mariadb:11.4
    container_name: msa-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MARIADB_USER: "${DB_USER}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
      TZ: Asia/Seoul
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports: ["3307:3306"]                                  # 운영 3306 과 충돌 회피
    volumes:
      - msa_mariadb_data:/var/lib/mysql
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro    # 스키마 5개 + ddarahakit 생성
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h127.0.0.1 -uroot -p\"$$MARIADB_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [msa-net]

  kafka:
    image: apache/kafka:3.8.1                             # 공식 이미지, KRaft (Zookeeper 불필요)
    container_name: msa-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [msa-net]

  kafka-init:                                             # 토픽 1회 생성 후 종료
    image: apache/kafka:3.8.1
    depends_on:
      kafka: { condition: service_healthy }
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for t in commerce.order.v1 review.review.v1 identity.user.v1; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
            --topic "$$t" --partitions 3 --replication-factor 1
        done
        echo "topics ready"
    restart: "no"
    networks: [msa-net]

  eureka:
    build:
      context: .
      dockerfile: infra/discovery/Dockerfile
    image: ddarahakit/msa-discovery:dev
    container_name: msa-eureka
    ports: ["8761:8761"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [msa-net]

  # ---------- 게이트웨이 ----------
  gateway:
    build:
      context: .
      dockerfile: infra/gateway/Dockerfile
    image: ddarahakit/msa-gateway:dev
    container_name: msa-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      JWT_SECRET: "${JWT_SECRET}"
      GATEWAY_CORS_ENABLED: "true"                                   # MSA 프론트(브라우저) 대상 CORS 일원화
      APP_ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:8081}"
    ports: ["8080:8080"]
    depends_on:
      eureka: { condition: service_healthy }
      identity-service: { condition: service_started }
    networks: [msa-net]

  # ---------- MSA 프론트엔드 (브라우저가 게이트웨이를 API 로 호출, 정적 SPA) ----------
  frontend:
    build:
      context: ./ddarahakit_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8080"        # 게이트웨이
        VITE_IMG_BASE_URL: "http://localhost:8080"
        VITE_STORAGE_SECRET_KEY: "${VITE_STORAGE_SECRET_KEY:-msaDevStorageKey1234567890}"
        VITE_PORTONE_STORE_ID: "${VITE_PORTONE_STORE_ID:-dev}"
        VITE_PORTONE_CHANNEL_KEY: "${VITE_PORTONE_CHANNEL_KEY:-dev}"
    image: ddarahakit/msa-frontend:dev
    container_name: msa-frontend
    ports: ["8081:80"]
    depends_on: [gateway]
    networks: [msa-net]

  # ---------- identity-service (1단계 추출) ----------
  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    image: ddarahakit/msa-identity:dev
    container_name: msa-identity
    environment:
      SPRING_PROFILES_ACTIVE: "default"
      DB_URL: "jdbc:mariadb://mariadb:3306/identity_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      AES_SECRET_KEY: "${AES_SECRET_KEY}"
      MAIL_ADDR: "${MAIL_ADDR}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI}"
      KAKAO_CLIENT_ID: "${KAKAO_CLIENT_ID}"
      KAKAO_CLIENT_SECRET: "${KAKAO_CLIENT_SECRET}"
      KAKAO_REDIRECT_URI: "${KAKAO_REDIRECT_URI}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      UPLOAD_PATH: "/app/uploads"
    volumes:
      - msa_uploads:/app/uploads
    depends_on:
      mariadb: { condition: service_healthy }
      eureka: { condition: service_healthy }
    networks: [msa-net]

  # ---------- community-service (2단계 추출) ----------
  community-service:
    build:
      context: .
      dockerfile: services/community-service/Dockerfile
    image: ddarahakit/msa-community:dev
    container_name: msa-community
    environment:
      DB_URL: "jdbc:mariadb://mariadb:3306/community_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      UPLOAD_PATH: "/app/uploads"
    volumes:
      - msa_uploads:/app/uploads
    depends_on:
      mariadb: { condition: service_healthy }
      eureka: { condition: service_healthy }
    networks: [msa-net]

  # ---------- commerce-service (3단계 추출, 첫 Kafka 이벤트 발행) ----------
  commerce-service:
    build:
      context: .
      dockerfile: services/commerce-service/Dockerfile
    image: ddarahakit/msa-commerce:dev
    container_name: msa-commerce
    environment:
      DB_URL: "jdbc:mariadb://mariadb:3306/commerce_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      MONOLITH_URL: "http://course-service:8080"   # 모놀리스 은퇴: course-service 가 /course 제공
      PORTONE_SECRET: "${PORTONE_SECRET}"
    depends_on:
      mariadb: { condition: service_healthy }
      eureka: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [msa-net]

  # ---------- review-service (4단계 추출, ReviewCreated/Updated/Deleted 이벤트) ----------
  review-service:
    build:
      context: .
      dockerfile: services/review-service/Dockerfile
    image: ddarahakit/msa-review:dev
    container_name: msa-review
    environment:
      DB_URL: "jdbc:mariadb://mariadb:3306/review_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      MONOLITH_URL: "http://course-service:8080"   # 모놀리스 은퇴: course-service 가 /course 제공
    depends_on:
      mariadb: { condition: service_healthy }
      eureka: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [msa-net]

  # ---------- course-service (5단계 코어 추출, 이벤트 소비자 enrollment/rating) ----------
  course-service:
    build:
      context: .
      dockerfile: services/course-service/Dockerfile
    image: ddarahakit/msa-course:dev
    container_name: msa-course
    environment:
      DB_URL: "jdbc:mariadb://mariadb:3306/course_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      mariadb: { condition: service_healthy }
      eureka: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [msa-net]

  # (모놀리스 은퇴 완료 — 전 도메인이 5개 서비스로 추출되어 monolith 서비스 제거)

networks:
  msa-net:
    driver: bridge

volumes:
  msa_mariadb_data:
  msa_uploads:
